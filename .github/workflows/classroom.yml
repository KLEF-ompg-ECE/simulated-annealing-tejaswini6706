name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Section A - Code Runs
      id: section-a-code-runs
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Section A - Code Runs
        setup-command: pip install pytest matplotlib
        command: python -m pytest tests/test_assignment1.py::TestCodeRuns -v
        timeout: 60
        max-score: 25
    - name: Section B - Plot Files
      id: section-b-plot-files
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Section B - Plot Files
        setup-command: pip install pytest matplotlib
        command: python -m pytest tests/test_assignment1.py::TestPlotsExist -v
        timeout: 30
        max-score: 25
    - name: Section C - README Observations
      id: section-c-readme-observations
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Section C - README Observations
        setup-command: pip install pytest matplotlib
        command: python -m pytest tests/test_assignment1.py::TestREADME -v
        timeout: 30
        max-score: 35
    - name: Section D - Code Modified
      id: section-d-code-modified
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Section D - Code Modified
        setup-command: pip install pytest matplotlib
        command: python -m pytest tests/test_assignment1.py::TestCodeModified -v
        timeout: 30
        max-score: 15
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        SECTION-A-CODE-RUNS_RESULTS: "${{steps.section-a-code-runs.outputs.result}}"
        SECTION-B-PLOT-FILES_RESULTS: "${{steps.section-b-plot-files.outputs.result}}"
        SECTION-C-README-OBSERVATIONS_RESULTS: "${{steps.section-c-readme-observations.outputs.result}}"
        SECTION-D-CODE-MODIFIED_RESULTS: "${{steps.section-d-code-modified.outputs.result}}"
      with:
        runners: section-a-code-runs,section-b-plot-files,section-c-readme-observations,section-d-code-modified
